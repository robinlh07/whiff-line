name: Retrain

on:
  schedule:
    # Monday 10am UTC, once a week.
    - cron: "0 10 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild training data (expanding window since 2022)
        run: python scripts/build_training_data.py

      - name: Train models
        run: python scripts/train_model.py

      - name: Commit updated models + training data
        run: |
          git config user.name "whiff-line-bot"
          git config user.email "actions@users.noreply.github.com"
          git add models/ data/training_data.csv
          git diff --cached --quiet || git commit -m "Weekly retrain $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
