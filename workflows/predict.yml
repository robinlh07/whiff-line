name: Predict

on:
  schedule:
    # Times are UTC. These land roughly 8am, 12pm, 3pm, 6pm US Eastern —
    # adjust to taste. Cron minimum granularity is 1 minute; GitHub may
    # delay a few minutes under load, which is fine for this use case.
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 19 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions
        run: python scripts/predict_today.py

      - name: Commit updated data
        run: |
          git config user.name "whiff-line-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/projections.json data/predictions_history.json
          git diff --cached --quiet || git commit -m "Refresh projections $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
