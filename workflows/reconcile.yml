name: Reconcile

on:
  schedule:
    # 9am UTC — well after even West Coast night games finish.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reconciliation
        run: python scripts/reconcile.py

      - name: Commit updated data
        run: |
          git config user.name "whiff-line-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/performance.json data/predictions_history.json
          git diff --cached --quiet || git commit -m "Reconcile results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
