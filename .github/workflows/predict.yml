name: Predict

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 19 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run predictions
        run: python scripts/predict_today.py
      - name: Commit updated data
        run: |
          git config user.name "whiff-line-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/projections.json data/predictions_history.json
          git diff --cached --quiet || git commit -m "Refresh projections $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
